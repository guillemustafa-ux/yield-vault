[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"

# RPC de cada red, leído de variables de entorno (.env). Se usa con --rpc-url <red>
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"

# Verificación de contratos. Con Etherscan API V2 una sola key sirve para todas
# las redes (se enruta por chainid). Si usás keys separadas, cambiá el valor.
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532 }
arbitrum_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 421614 }
